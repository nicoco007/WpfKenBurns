name: build

on: [ push ]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Check out
      uses: actions/checkout@v6

    - name: Build
      run: dotnet publish -c Release

    - name: Upload
      uses: actions/upload-artifact@v7
      with:
        name: WpfKenBurns
        path: WpfKenBurns/bin/Release/win-x64/publish/Ken Burns.scr